<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dezleks</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="header__center">
        <div class="header__title">Dezleks</div>
        <div id="statusText" class="header__status" data-i18n="status.ready">Готово</div>
      </div>
    </header>

    <main class="shell">
      <section id="screenHome" class="screen screen--active" aria-label="Стартовий екран">
        <div class="homeHero">
          <div class="homeHero__logo" aria-hidden="true">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/>
              <path d="M14 2v6h6"/>
              <circle cx="11" cy="13" r="3"/>
              <path d="m13.2 15.2 2.6 2.6"/>
            </svg>
          </div>

          <div class="homeHero__title" data-i18n="home.title">Dezleks</div>
          <div class="homeHero__subtitle" data-i18n="home.subtitle">
            Для людей із дислексією: розпізнає текст і показує його шрифтом, що допомагає читати легше.
          </div>

          <div class="homeHero__actions">
            <button id="btnTakePhoto" class="homeActionBtn homeActionBtn--primary">
              <span class="homeActionBtn__icon" aria-hidden="true">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3l2-3h8l2 3h3a2 2 0 0 1 2 2z"/>
                  <circle cx="12" cy="13" r="4"/>
                </svg>
              </span>
              <span class="homeActionBtn__text" data-i18n="home.takePhoto">Зробити фото</span>
            </button>

            <button id="btnPickPhoto" class="homeActionBtn">
              <span class="homeActionBtn__icon" aria-hidden="true">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                  <circle cx="8.5" cy="8.5" r="1.5"/>
                  <path d="m21 15-5-5L5 21"/>
                </svg>
              </span>
              <span class="homeActionBtn__text" data-i18n="home.pickPhoto">Обрати фото</span>
            </button>
          </div>
        </div>
      </section>

      <section id="screenSettings" class="screen" aria-label="Налаштування">
        <div class="panel">
          <div class="sectionTitle" data-i18n="settings.title">Налаштування</div>

          <div class="settings settings--three">
            <div class="settings__group">
              <label class="label" for="selectTheme" data-i18n="settings.theme">Тема оформлення</label>
              <select id="selectTheme" class="select">
                <option value="default" data-i18n="theme.default">Темна (Стандартна)</option>
                <option value="light-blue" data-i18n="theme.lightBlue">Світла (Блакитна)</option>
                <option value="dark-purple" data-i18n="theme.darkPurple">Темна (Фіолетова)</option>
                <option value="light-green" data-i18n="theme.lightGreen">Світла (Зелена)</option>
              </select>
            </div>

            <div class="settings__group">
              <label class="label" for="selectUiLang" data-i18n="settings.uiLanguage">Мова інтерфейсу</label>
              <select id="selectUiLang" class="select">
                <option value="uk" data-i18n="lang.uk">Українська</option>
                <option value="en" data-i18n="lang.en">English</option>
              </select>
            </div>

            <div class="settings__group">
              <label class="label" for="selectEngine" data-i18n="settings.ocrEngine">Двигун OCR</label>
              <select id="selectEngine" class="select">
                <option value="tesseract" selected data-i18n="settings.engineTesseract">Tesseract</option>
                <option value="mlkit" data-i18n="settings.engineMlkit">Google ML Kit</option>
                <option value="gemma" data-i18n="settings.engineGemma">Gemma</option>
              </select>
            </div>

            <div class="settings__group">
              <label class="label" for="selectLang" data-i18n="settings.ocrLanguages">Мови OCR</label>
              <select id="selectLang" class="select">
                <option value="ukr+eng" selected>ukr+eng</option>
                <option value="ukr">ukr</option>
                <option value="eng">eng</option>
              </select>
            </div>

            <div class="settings__group">
              <label class="label" for="toggleAutoCorrect" data-i18n="settings.startCorrection">Корекція при старті</label>
              <button id="toggleAutoCorrect" class="btn btn--secondary">Увімкнено</button>
            </div>

            <div class="settings__group">
              <label class="label" for="toggleAiClean" data-i18n="settings.aiCleanup">Очищення нейромережею</label>
              <button id="toggleAiClean" class="btn btn--secondary">Увімкнено</button>
            </div>

            <div class="settings__group settings__group--wide">
              <label class="label" for="inputAiPrompt" data-i18n="settings.cleanupPrompt">Промпт для очищення (Gemma)</label>
              <textarea
                id="inputAiPrompt"
                class="input"
                rows="6"
                lang="uk"
                dir="auto"
                inputmode="text"
                autocapitalize="sentences"
                autocorrect="on"
                spellcheck="true"
                data-i18n-placeholder="settings.cleanupPromptPlaceholder"
                placeholder="Порожньо — стандартний промпт."
              ></textarea>
            </div>

            <div class="settings__group settings__group--wide">
              <label class="label" for="inputExplainPrompt" data-i18n="settings.explainPrompt">Промпт для пояснення (Gemma)</label>
              <textarea
                id="inputExplainPrompt"
                class="input"
                rows="6"
                lang="uk"
                dir="auto"
                inputmode="text"
                autocapitalize="sentences"
                autocorrect="on"
                spellcheck="true"
                data-i18n-placeholder="settings.explainPromptPlaceholder"
                placeholder="Порожньо — стандартний промпт."
              ></textarea>
            </div>

            <div class="settings__group settings__group--wide">
              <label class="label" for="inputModelPath" data-i18n="settings.modelPath">Шлях до моделі (Gemma)</label>
              <input id="inputModelPath" class="input" type="text" data-i18n-placeholder="settings.modelPathPlaceholder" placeholder="/path/to/model.task або .litertlm" />
            </div>

            <div class="settings__group settings__group--wide">
              <label class="label" for="inputModelUrl" data-i18n="settings.modelUrl">Посилання для завантаження моделі</label>
              <input id="inputModelUrl" class="input" type="text" placeholder="https://..." />
            </div>

            <div class="settings__group settings__group--wide">
              <div class="row">
                <button id="btnDownloadE2B" class="btn btn--secondary" data-i18n="settings.downloadE2B">Завантажити Gemma 4 E2B</button>
                <button id="btnDownloadE4B" class="btn btn--secondary" data-i18n="settings.downloadE4B">Завантажити Gemma 4 E4B</button>
              </div>
            </div>

            <div class="settings__group settings__group--wide">
              <label class="label" for="inputModelToken" data-i18n="settings.modelToken">Токен доступу (не зберігається)</label>
              <input id="inputModelToken" class="input" type="password" placeholder="Hugging Face token / Bearer token" />
            </div>

            <div class="settings__group settings__group--wide">
              <button id="btnDownloadModel" class="btn btn--secondary" data-i18n="settings.downloadModel">Завантажити модель</button>
              <div id="modelDownloadStatus" class="hint"></div>
            </div>
          </div>
        </div>
      </section>

      <section id="screenEdit" class="screen" aria-label="Фото та виділення області">
        <section class="panel panel--left">
          <div class="sectionTitle" data-i18n="edit.title">Фото</div>
          <div class="hint" data-i18n="edit.hint">
            За потреби натисніть “Корекція перспективи”, відрегулюйте 4 точки, застосуйте. Потім виділіть область тексту.
          </div>

          <div class="toolbar">
            <button id="btnToggleWarp" class="btn btn--secondary" data-i18n="edit.perspective">Корекція перспективи</button>
            <button id="btnApplyWarp" class="btn btn--secondary" data-i18n="edit.apply">Застосувати</button>
            <button id="btnRotateLeft" class="btn btn--secondary" data-i18n="edit.rotateLeft">⟲ 90°</button>
            <button id="btnRotateRight" class="btn btn--secondary" data-i18n="edit.rotateRight">⟳ 90°</button>
            <button id="btnRecognize" class="btn btn--primary" data-i18n="edit.recognize">Розпізнати</button>
          </div>

          <div id="imageStage" class="imageStage" aria-label="Зона фото">
            <img id="imgPreview" class="imageStage__img" data-i18n-alt="edit.photoAlt" alt="Фото" />
            <svg id="quadSvg" class="imageStage__svg" viewBox="0 0 100 100" preserveAspectRatio="none">
              <polygon id="quadPoly" points="" />
            </svg>
            <div id="roiOverlay" class="imageStage__overlay" aria-label="Оверлей"></div>
          </div>

          <div class="row">
            <div class="kv">
              <div class="kv__k">ROI</div>
              <div id="roiText" class="kv__v">—</div>
            </div>
          </div>
        </section>
      </section>

      <section id="screenResult" class="screen" aria-label="Розпізнаний текст">
        <section class="panel panel--right">
          <div class="resultHeader">
            <div class="sectionTitle" data-i18n="result.title">Результат</div>
            <div class="resultHeader__actions">
              <button id="btnToggleTextSettings" class="btn btn--secondary" data-i18n="result.viewSettings">Налаштування вигляду</button>
              <div class="resultHeader__iconRow">
                <button
                  id="btnPrint"
                  class="btn btn--secondary resultActionIcon"
                  data-i18n-aria-label="result.print"
                  data-i18n-title="result.print"
                >
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 9V2h12v7" />
                    <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />
                    <path d="M6 14h12v8H6z" />
                  </svg>
                </button>
                <button
                  id="btnSpeak"
                  class="btn btn--secondary resultActionIcon"
                  data-i18n-aria-label="result.speak"
                  data-i18n-title="result.speak"
                >
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                    <path d="M15.5 8.5a5 5 0 0 1 0 7" />
                    <path d="M18.5 6a8.5 8.5 0 0 1 0 12" />
                  </svg>
                </button>
              </div>
              <div class="resultHeader__textRow">
                <button id="btnClean" class="btn btn--secondary" data-i18n="result.clean">Очистити (Gemma)</button>
                <button id="btnExplain" class="btn btn--secondary" data-i18n="result.explain">Пояснити (Gemma)</button>
              </div>
            </div>
          </div>

          <div id="textSettings" class="settings settings--hidden">
            <div class="settings__group">
              <label class="label" for="fontFamily" data-i18n="result.font">Шрифт</label>
              <select id="fontFamily" class="select">
                <option value="OpenDyslexic-Regular" selected>OpenDyslexic Regular</option>
                <option value="OpenDyslexic-Bold">OpenDyslexic Bold</option>
                <option value="OpenDyslexic-Italic">OpenDyslexic Italic</option>
                <option value="OpenDyslexic-BoldItalic">OpenDyslexic BoldItalic</option>
                <option value="system" data-i18n="result.systemFont">Системний</option>
              </select>
            </div>

            <div class="settings__group">
              <label class="label" for="fontSize" data-i18n="result.fontSize">Розмір</label>
              <input id="fontSize" class="input" type="number" min="12" max="64" step="1" />
            </div>

            <div class="settings__group">
              <label class="label" for="lineHeight" data-i18n="result.lineHeight">Міжряддя</label>
              <input id="lineHeight" class="input" type="number" min="1.2" max="2.4" step="0.05" />
            </div>

            <div class="settings__group">
              <label class="label" for="bgColor" data-i18n="result.background">Фон</label>
              <input id="bgColor" class="input input--color" type="color" />
            </div>

            <div class="settings__group">
              <label class="label" for="textColor" data-i18n="result.textColor">Текст</label>
              <input id="textColor" class="input input--color" type="color" />
            </div>
          </div>

          <div id="output" class="output" aria-label="Текст"></div>
        </section>
      </section>

      <input id="fileInput" type="file" accept="image/*" class="hidden" />
      <input id="cameraInput" type="file" accept="image/*" capture="environment" class="hidden" />
    </main>

    <nav class="bottomNav">
      <button
        id="btnBack"
        class="btn btn--secondary bottomNav__btn"
        data-i18n-aria-label="nav.back"
        data-i18n-title="nav.back"
      >
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <button
        id="btnGoSettings"
        class="btn btn--secondary bottomNav__btn"
        data-i18n-aria-label="nav.settings"
        data-i18n-title="nav.settings"
      >
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </nav>

    <div id="busyOverlay" class="busyOverlay hidden" aria-hidden="true">
      <div class="busyOverlay__card" role="status" aria-live="polite">
        <div class="spinner" aria-hidden="true"></div>
        <div id="busyText" class="busyOverlay__text" data-i18n="common.processing">Обробка…</div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
